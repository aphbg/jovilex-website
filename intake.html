async function apiCall(sys,usr){
  const r=await fetch(API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'API error');
  return d.content?.map(b=>b.text||'').join('')||'';
}
