<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jovilex · Client Intake Engine</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111111'/><circle cx='23' cy='7' r='5' fill='%2310B981'/><text x='13' y='25' font-family='Arial' font-weight='900' font-size='22' fill='white' text-anchor='middle'>J</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#fff;font-family:'Outfit',sans-serif;min-height:100vh}
.ie-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.ie-logo{font-family:'Sora',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.02em}
.ie-logo em{color:#10B981;font-style:normal}
.ie-badge{font-size:11px;color:#6B7280;letter-spacing:.08em;text-transform:uppercase}
.steps{display:flex;align-items:center;gap:6px;padding:18px 28px 0}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:10px;font-weight:700;flex-shrink:0;transition:all .3s}
.sdot.done{background:#10B981;color:#0d0d0d}.sdot.active{background:#fff;color:#0d0d0d;box-shadow:0 0 0 3px rgba(16,185,129,.3)}.sdot.pending{background:#1e1e1e;color:#6B7280;border:1px solid #2a2a2a}
.sline{flex:1;height:1px;background:#2a2a2a;transition:background .3s}.sline.done{background:#10B981}
.card{background:#141414;border:1px solid #222;border-radius:14px;padding:24px;margin:16px 28px}
.ctitle{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.csub{color:#6B7280;font-size:13px;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:#9CA3AF;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input,.field textarea{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;color:#fff;font-family:'Outfit',sans-serif;font-size:14.5px;padding:11px 14px;outline:none;transition:border-color .2s;resize:vertical}
.field input:focus,.field textarea:focus{border-color:#10B981}
.field textarea{min-height:80px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:4px}
.svc{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:13px;cursor:pointer;transition:all .2s}
.svc:hover{border-color:#3a3a3a}.svc.on{border-color:#10B981;background:rgba(16,185,129,.06)}
.svc-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;margin-bottom:3px}
.svc.on .svc-name{color:#10B981}
.svc-sub{font-size:11px;color:#6B7280;line-height:1.4}
.calc{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;padding:11px 14px;font-size:14.5px;color:#10B981;font-weight:600}
.btns{display:flex;gap:10px;padding:0 28px 24px}
.btn{padding:12px 22px;border-radius:9px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.bb{background:#1a1a1a;color:#9CA3AF;border:1px solid #2a2a2a}.bb:hover{color:#fff}
.bn{background:#10B981;color:#0d2e1f;flex:1}.bn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(16,185,129,.5)}.bn:disabled{opacity:.5;cursor:not-allowed}
.bg{background:#FF7A2E;color:#1a0e06;flex:1}.bg:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(255,122,46,.5)}.bg:disabled{opacity:.5;cursor:not-allowed}
.be{background:#1a1a1a;color:#10B981;border:1px solid rgba(16,185,129,.4);flex:1}.be:hover:not(:disabled){background:rgba(16,185,129,.08);transform:translateY(-2px)}.be:disabled{opacity:.5;cursor:not-allowed}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.mode-card{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:12px;padding:20px;cursor:pointer;transition:all .25s;text-align:center}
.mode-card:hover{border-color:#3a3a3a;transform:translateY(-2px)}.mode-card.sel{border-color:#10B981;background:rgba(16,185,129,.06)}
.mode-icon{font-size:24px;margin-bottom:10px}
.mode-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;margin-bottom:5px}
.mode-card.sel .mode-title{color:#10B981}
.mode-desc{font-size:12px;color:#6B7280;line-height:1.5}
.paste-area{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:11px;color:#D1D5DB;font-family:'Outfit',sans-serif;font-size:13.5px;padding:16px;outline:none;resize:vertical;min-height:180px;line-height:1.7;transition:border-color .2s}
.paste-area:focus{border-color:#10B981}
.hint{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.18);border-radius:9px;padding:11px 14px;font-size:12.5px;color:#6B7280;margin-top:10px;line-height:1.6}
.hint strong{color:#10B981}
.auto-badge{display:inline-block;font-size:10px;font-weight:600;color:#10B981;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle}
.af-bar{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.18);border-radius:9px;padding:11px 14px;font-size:13px;color:#10B981;margin-bottom:16px}
.loading-wrap{padding:44px 28px;text-align:center}
.spin{width:40px;height:40px;border:2.5px solid #222;border-top-color:#10B981;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 18px}
@keyframes sp{to{transform:rotate(360deg)}}
.ltitle{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px}
.lsub{color:#6B7280;font-size:13.5px;margin-bottom:20px}
.ldocs{display:flex;flex-direction:column;gap:7px;max-width:340px;margin:0 auto}
.ldoc{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#141414;border:1px solid #222;border-radius:9px;font-size:13.5px;color:#6B7280;transition:all .4s}
.ldoc.working{color:#10B981;border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.05)}.ldoc.done-doc{color:#374151}
.pulse{width:6px;height:6px;border-radius:50%;background:#10B981;animation:pl 1.2s ease-in-out infinite;flex-shrink:0}
.chk{color:#10B981;font-size:11px;flex-shrink:0}
@keyframes pl{0%,100%{opacity:.2}50%{opacity:1}}
.tabs{display:flex;gap:3px;padding:0 28px;margin-top:16px;flex-wrap:wrap}
.tab{padding:8px 14px;border-radius:7px 7px 0 0;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;border-bottom:none;transition:all .2s;font-family:'Outfit',sans-serif}
.tab.on{background:#141414;border-color:#222;color:#fff}.tab:not(.on){color:#6B7280}.tab:not(.on):hover{color:#9CA3AF}
.doc-panel{background:#141414;border:1px solid #222;border-radius:0 12px 12px 12px;margin:0 28px;padding:20px}
.dtool{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.dlabel{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;flex:1}
.dbtn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#9CA3AF;font-family:'Outfit',sans-serif;transition:all .2s}
.dbtn:hover{border-color:#10B981;color:#10B981}.dbtn.cp{background:rgba(16,185,129,.1);border-color:#10B981;color:#10B981}
.doctext{white-space:pre-wrap;font-family:'Outfit',sans-serif;font-size:13px;line-height:1.85;color:#D1D5DB;background:#111;border-radius:9px;padding:16px;max-height:400px;overflow-y:auto;border:1px solid #1e1e1e}
.ok-bar{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:9px;padding:11px 16px;margin:12px 28px 0;display:flex;align-items:center;gap:8px;font-size:13px;color:#10B981}
.err-bar{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.25);border-radius:9px;padding:11px 16px;margin:6px 28px;font-size:13px;color:#FF8080}
.reset-btn{margin:12px 28px 24px;padding:12px;border-radius:9px;background:#1a1a1a;border:1px solid #2a2a2a;color:#6B7280;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;width:calc(100% - 56px);transition:all .2s}
.reset-btn:hover{border-color:#10B981;color:#10B981}
@media(max-width:580px){.two,.three,.svc-grid,.mode-grid{grid-template-columns:1fr}.btns,.tabs{padding-left:14px;padding-right:14px}.card,.doc-panel,.ok-bar,.err-bar,.reset-btn{margin-left:14px;margin-right:14px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
(function(){
var useState=React.useState,h=React.createElement;
var API='/api/intake';
var SVCS=[
  {id:'ai',name:'AI-Augmented Operations',sub:'AI Map · Automation · Custom Agents · AI OS'},
  {id:'digital',name:'Digital Products & Systems',sub:'Websites · MVPs · Web Apps · Marketplaces · SaaS'},
  {id:'strategy',name:'Business Architecture & Strategy',sub:'Business Model · GTM · Investor Package · Ecosystem'},
  {id:'human',name:'Human Performance & Potential',sub:'Personal OS · Executive Performance · Clarity Session'}
];
var DOCLIST=[{id:'brief',label:'Brief'},{id:'contract',label:'Contract'},{id:'invoice',label:'Invoice'},{id:'onboarding',label:'Onboarding'},{id:'activation',label:'⚡ Activation'}];
var DOC_LABELS={brief:'Client Brief',contract:'Contract',invoice:'Invoice',onboarding:'Onboarding',activation:'Project Activation Document'};
var PROG_KEYS=['brief','contract','invoice','onboarding','activation'];
var PROG_LABELS={brief:'Generating client brief',contract:'Drafting contract',invoice:'Building invoice',onboarding:'Writing onboarding letter',activation:'Building project activation document'};
var EMPTY={name:'',company:'',email:'',phone:'',problem:'',success:'',notes:'',svcs:[],deliverables:'',start:'',delivery:'',price:''};

function apiCall(sys,usr){
  return fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]})})
    .then(function(r){return r.json();})
    .then(function(d){if(d.error)throw new Error(d.error.message||'API error');return(d.content||[]).map(function(b){return b.text||'';}).join('');});
}

function App(){
  var s=useState,ms=s(null),mode=ms[0],setMode=ms[1];
  var ss=s(0),step=ss[0],setStep=ss[1];
  var ts=s(''),transcript=ts[0],setTranscript=ts[1];
  var es=s(false),extracting=es[0],setExtracting=es[1];
  var xs=s(false),extracted=xs[0],setExtracted=xs[1];
  var fs=s(EMPTY),form=fs[0],setForm=fs[1];
  var ls=s(false),loading=ls[0],setLoading=ls[1];
  var ps=s({brief:0,contract:0,invoice:0,onboarding:0,activation:0}),prog=ps[0],setProg=ps[1];
  var rs=s(null),results=rs[0],setResults=rs[1];
  var errs=s(''),error=errs[0],setError=errs[1];
  var ads=s('brief'),activeDoc=ads[0],setActiveDoc=ads[1];
  var cs=s(''),copied=cs[0],setCopied=cs[1];

  function u(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  function toggleSvc(id){setForm(function(f){var svcs=f.svcs.includes(id)?f.svcs.filter(function(s){return s!==id;}):[].concat(f.svcs,[id]);return Object.assign({},f,{svcs:svcs});});}
  var dep=form.price?(parseFloat(form.price)*0.5).toLocaleString():'—';
  var bal=form.price?(parseFloat(form.price)*0.5).toLocaleString():'—';
  var svcStr=SVCS.filter(function(s){return form.svcs.includes(s.id);}).map(function(s){return s.name;}).join(', ')||'To be confirmed';
  var ctx='Client:'+form.name+'|Co:'+(form.company||'N/A')+'|Email:'+form.email+'|Phone:'+(form.phone||'N/A')+'|Services:'+svcStr+'|Problem:'+form.problem+'|Success:'+form.success+'|Notes:'+(form.notes||'None')+'|Deliverables:'+form.deliverables+'|Start:'+(form.start||'On deposit')+'|Delivery:'+(form.delivery||'TBC')+'|Price:USD $'+form.price+'|Deposit:$'+dep+'|Balance:$'+bal;

  function extract(){
    if(!transcript.trim())return;
    setExtracting(true);setError('');
    apiCall('You are the Jovilex intake system. Extract client information from a call transcript. Return ONLY valid JSON with keys: name,company,email,phone,problem,success,notes,deliverables,price. Empty string for anything not found.',
      'Extract from:\n'+transcript)
    .then(function(raw){
      var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      setForm(function(f){
        var n=Object.assign({},f);
        Object.keys(parsed).forEach(function(k){if(parsed[k])n[k]=parsed[k];});
        return n;
      });
      setExtracted(true);setStep(1);
    })
    .catch(function(e){setError('Extraction failed: '+(e.message||'Try again'));})
    .finally(function(){setExtracting(false);});
  }

  function generate(){
    setLoading(true);setError('');setStep(4);
    setProg({brief:0,contract:0,invoice:0,onboarding:0,activation:0});
    var res={};
    var calls=[
      ['brief','Generate a professional internal client brief for Jovilex. Plain text only. Use === SECTION === dividers.','Brief:\n'+ctx+'\n\nSections: CLIENT DETAILS|THE PROBLEM|SUCCESS LOOKS LIKE|SCOPE AGREED|DELIVERABLES|TIMELINE|COMMERCIALS|NEXT STEP'],
      ['contract','Generate a professional Scope of Work & Services Agreement for Jovilex. Plain text only. Clear section headers. Fill all client details.','Contract:\n'+ctx+'\n\nSections: PARTIES|SCOPE|DELIVERABLES|TIMELINE|PRICE & PAYMENT (50/50)|REVISIONS|IP OWNERSHIP|CANCELLATION|SIGNATURES'],
      ['invoice','Generate a professional invoice. Plain text. From: Jovilex|hello@jovilex.com|jovilex.com.','Invoice:\n'+ctx+'\n\nINV-001, billed to client, line items, total, 50/50 payment terms, payment details placeholder.'],
      ['onboarding','Generate a warm personal client onboarding welcome for Jovilex. Confident, warm, direct. Reference what this client is building. Sign off as Jovilex.','Onboarding:\n'+ctx+'\n\nWarm opening, what we understood, engagement details, next 24hrs, what we need, hello@jovilex.com open 24hrs, our promise.'],
      ['activation','Generate a Jovilex Project Activation Document — internal build-phase reference. Plain text. Use === SECTION === dividers.','Project Activation:\n'+ctx+'\n\n01 CLIENT & ENGAGEMENT\n02 THE PROBLEM\n03 BUILD PHASES (3-5 phases specific to services agreed)\n04 INTERNAL & EXTERNAL COMPONENTS\n05 ASSETS REQUIRED FROM CLIENT\n06 HANDOFF CHECKLIST\n07 CLAUDE BUILD CONTEXT']
    ];
    var chain=Promise.resolve();
    calls.forEach(function(c){
      chain=chain.then(function(){
        setProg(function(p){var n=Object.assign({},p);n[c[0]]=1;return n;});
        return apiCall(c[1],c[2]).then(function(text){
          res[c[0]]=text;
          setProg(function(p){var n=Object.assign({},p);n[c[0]]=2;return n;});
        });
      });
    });
    chain.then(function(){setResults(res);setStep(5);setActiveDoc('brief');})
    .catch(function(e){setError('Error: '+(e.message||'Try again'));setStep(3);})
    .finally(function(){setLoading(false);});
  }

  function copy(k,t){navigator.clipboard.writeText(t||'').then(function(){setCopied(k);setTimeout(function(){setCopied('');},2000);});}
  function dl(k,t){var b=new Blob([t||''],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='Jovilex_'+k+'_'+form.name.replace(/\s+/g,'_')+'.txt';a.click();URL.revokeObjectURL(u);}
  function reset(){setStep(0);setMode(null);setResults(null);setError('');setTranscript('');setExtracted(false);setForm(EMPTY);}

  var can1=form.name&&form.email,can2=form.problem&&form.success,can3=form.svcs.length>0&&form.deliverables&&form.price;

  if(step===0)return h('div',null,
    h('div',{className:'ie-header'},h('div',{className:'ie-logo'},'Jovi',h('em',null,'lex')),h('div',{className:'ie-badge'},'Client Intake Engine')),
    h('div',{className:'card',style:{marginTop:24}},
      h('div',{className:'ctitle'},'New client intake'),
      h('div',{className:'csub'},'How do you want to enter the client details?'),
      h('div',{className:'mode-grid'},
        h('div',{className:'mode-card '+(mode==='paste'?'sel':''),onClick:function(){setMode('paste');}},h('div',{className:'mode-icon'},'🎙️'),h('div',{className:'mode-title'},'Paste call summary'),h('div',{className:'mode-desc'},'Paste any call transcript or AI summary. Engine extracts and pre-fills the form.')),
        h('div',{className:'mode-card '+(mode==='manual'?'sel':''),onClick:function(){setMode('manual');}},h('div',{className:'mode-icon'},'✍️'),h('div',{className:'mode-title'},'Fill manually'),h('div',{className:'mode-desc'},'Fill client details from your notes, step by step.'))
      ),
      mode==='paste'&&h('div',{style:{marginTop:18}},
        h('div',{className:'field'},h('label',null,'Paste call transcript or summary'),h('textarea',{className:'paste-area',value:transcript,onChange:function(e){setTranscript(e.target.value);},placeholder:'Paste Fireflies summary, Otter transcript, or any call notes here.'})),
        h('div',{className:'hint'},h('strong',null,'Works with: '),'Fireflies.ai · Otter.ai · Manual notes · Any AI summary')
      ),
      error&&h('div',{className:'err-bar',style:{margin:'10px 0 0'}},error)
    ),
    h('div',{className:'btns'},
      mode==='manual'&&h('button',{className:'btn bn',onClick:function(){setStep(1);}},'Start filling →'),
      mode==='paste'&&h('button',{className:'btn be',disabled:!transcript.trim()||extracting,onClick:extract},extracting?'Extracting...':'⚡ Extract & pre-fill →')
    )
  );

  if(step===4)return h('div',null,
    h('div',{className:'ie-header'},h('div',{className:'ie-logo'},'Jovi',h('em',null,'lex')),h('div',{className:'ie-badge'},'Client Intake Engine')),
    h('div',{className:'loading-wrap'},
      h('div',{className:'spin'}),h('div',{className:'ltitle'},'Generating 5 documents'),h('div',{className:'lsub'},'One API call per document'),
      h('div',{className:'ldocs'},PROG_KEYS.map(function(k){
        return h('div',{key:k,className:'ldoc '+(prog[k]===1?'working':prog[k]===2?'done-doc':'')},
          prog[k]===1?h('span',{className:'pulse'}):prog[k]===2?h('span',{className:'chk'},'✓'):h('span',{style:{width:6}}),
          h('span',null,PROG_LABELS[k]));
      }))
    )
  );

  if(step===5&&results)return h('div',null,
    h('div',{className:'ie-header'},h('div',{className:'ie-logo'},'Jovi',h('em',null,'lex')),h('div',{className:'ie-badge'},'Client Intake Engine')),
    h('div',{className:'ok-bar'},'✓  5 documents ready for ',h('strong',null,form.name),'.'),
    h('div',{className:'tabs'},DOCLIST.map(function(d){return h('div',{key:d.id,className:'tab '+(activeDoc===d.id?'on':''),onClick:function(){setActiveDoc(d.id);}},d.label);})),
    h('div',{className:'doc-panel'},
      h('div',{className:'dtool'},h('div',{className:'dlabel'},DOC_LABELS[activeDoc]),
        h('button',{className:'dbtn '+(copied===activeDoc?'cp':''),onClick:function(){copy(activeDoc,results[activeDoc]);}},copied===activeDoc?'✓ Copied':'Copy'),
        h('button',{className:'dbtn',onClick:function(){dl(activeDoc,results[activeDoc]);}},'Download .txt')
      ),
      h('div',{className:'doctext'},results[activeDoc])
    ),
    h('button',{className:'reset-btn',onClick:reset},'+ New intake')
  );

  return h('div',null,
    h('div',{className:'ie-header'},h('div',{className:'ie-logo'},'Jovi',h('em',null,'lex')),h('div',{className:'ie-badge'},'Client Intake Engine')),
    h('div',{className:'steps'},[1,2,3].map(function(n,i){
      var cls=n<step?'done':n===step?'active':'pending';
      return[i>0&&h('div',{key:'l'+i,className:'sline '+(n<=step?'done':'')}),h('div',{key:'s'+n,className:'sdot '+cls},n<step?'✓':n)];
    }).reduce(function(a,b){return a.concat(b);},[]).filter(Boolean)),
    step===1&&h('div',null,
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'Client Details',extracted&&h('span',{className:'auto-badge'},'AUTO-FILLED')),
        h('div',{className:'csub'},extracted?'Extracted — review and adjust':'Who are we building for?'),
        extracted&&h('div',{className:'af-bar'},'✓  Pre-filled from call summary. Check and adjust.'),
        h('div',{className:'two'},
          h('div',{className:'field'},h('label',null,'Name *'),h('input',{value:form.name,onChange:function(e){u('name',e.target.value);},placeholder:'Jane Doe'})),
          h('div',{className:'field'},h('label',null,'Company'),h('input',{value:form.company,onChange:function(e){u('company',e.target.value);},placeholder:'Acme Corp'}))
        ),
        h('div',{className:'two'},
          h('div',{className:'field'},h('label',null,'Email *'),h('input',{type:'email',value:form.email,onChange:function(e){u('email',e.target.value);},placeholder:'jane@company.com'})),
          h('div',{className:'field'},h('label',null,'Phone'),h('input',{value:form.phone,onChange:function(e){u('phone',e.target.value);},placeholder:'+1 555 000 0000'}))
        )
      ),
      h('div',{className:'btns'},h('button',{className:'btn bb',onClick:function(){setStep(0);}},'← Back'),h('button',{className:'btn bn',disabled:!can1,onClick:function(){setStep(2);}},'Next →'))
    ),
    step===2&&h('div',null,
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'The Problem',extracted&&h('span',{className:'auto-badge'},'AUTO-FILLED')),
        h('div',{className:'csub'},extracted?'Adjust to match their exact words':'What are they solving?'),
        h('div',{className:'field'},h('label',null,'Problem — in their words *'),h('textarea',{value:form.problem,onChange:function(e){u('problem',e.target.value);},placeholder:'Use their language.'})),
        h('div',{className:'field'},h('label',null,'What success looks like *'),h('textarea',{value:form.success,onChange:function(e){u('success',e.target.value);},placeholder:'The outcome they walk away with.'})),
        h('div',{className:'field'},h('label',null,'Notes'),h('textarea',{style:{minHeight:'65px'},value:form.notes,onChange:function(e){u('notes',e.target.value);},placeholder:'Decision dynamics, urgency, red flags...'}))
      ),
      h('div',{className:'btns'},h('button',{className:'btn bb',onClick:function(){setStep(1);}},'← Back'),h('button',{className:'btn bn',disabled:!can2,onClick:function(){setStep(3);}},'Next →'))
    ),
    step===3&&h('div',null,
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'Scope & Price',extracted&&h('span',{className:'auto-badge'},'AUTO-FILLED')),
        h('div',{className:'csub'},'What are we delivering?'),
        h('div',{className:'field'},h('label',null,'Services *'),
          h('div',{className:'svc-grid'},SVCS.map(function(s){
            return h('div',{key:s.id,className:'svc '+(form.svcs.includes(s.id)?'on':''),onClick:function(){toggleSvc(s.id);}},
              h('div',{className:'svc-name'},s.name),h('div',{className:'svc-sub'},s.sub));
          }))
        ),
        h('div',{className:'field'},h('label',null,'Deliverables *'),h('textarea',{style:{minHeight:'70px'},value:form.deliverables,onChange:function(e){u('deliverables',e.target.value);},placeholder:'What the client receives...'})),
        h('div',{className:'two'},
          h('div',{className:'field'},h('label',null,'Start date'),h('input',{type:'date',value:form.start,onChange:function(e){u('start',e.target.value);}})),
          h('div',{className:'field'},h('label',null,'Delivery date'),h('input',{type:'date',value:form.delivery,onChange:function(e){u('delivery',e.target.value);}}))
        ),
        h('div',{className:'three'},
          h('div',{className:'field'},h('label',null,'Total (USD) *'),h('input',{type:'number',value:form.price,onChange:function(e){u('price',e.target.value);},placeholder:'5000'})),
          h('div',{className:'field'},h('label',null,'Deposit 50%'),h('div',{className:'calc'},dep==='—'?'—':'$'+dep)),
          h('div',{className:'field'},h('label',null,'Balance 50%'),h('div',{className:'calc'},bal==='—'?'—':'$'+bal))
        ),
        error&&h('div',{className:'err-bar'},error)
      ),
      h('div',{className:'btns'},h('button',{className:'btn bb',onClick:function(){setStep(2);}},'← Back'),h('button',{className:'btn bg',disabled:!can3||loading,onClick:generate},'⚡ Generate 5 Documents'))
    )
  );
}

ReactDOM.render(h(App,null),document.getElementById('app'));
})();
</script>
